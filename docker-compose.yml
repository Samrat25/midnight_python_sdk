version: '3.8'

services:
  midnight-node:
    image: midnight/node:latest
    ports:
      - "9944:9944"
    environment:
      - NETWORK=preprod
    volumes:
      - node-data:/data

  midnight-indexer:
    image: midnight/indexer:latest
    ports:
      - "8088:8088"
    environment:
      - NODE_URL=http://midnight-node:9944
    depends_on:
      - midnight-node

  midnight-proof-server:
    image: midnight/proof-server:latest
    ports:
      - "6300:6300"
    environment:
      - LOG_LEVEL=info

volumes:
  node-data:
