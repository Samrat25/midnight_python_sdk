version: '3.8'

services:
  # Midnight Node - The blockchain node
  midnight-node:
    image: ghcr.io/midnight-ntwrk/compact:latest
    container_name: midnight-node
    ports:
      - "9944:9944"
      - "9933:9933"
    environment:
      - RUST_LOG=info
      - NETWORK=local
    volumes:
      - midnight-node-data:/data
    command: >
      bash -c "
      compact node start
      --dev
      --rpc-port 9944
      --ws-port 9933
      --rpc-cors all
      --unsafe-rpc-external
      --unsafe-ws-external
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9944/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - midnight-network

  # Midnight Indexer - GraphQL API for querying blockchain state
  midnight-indexer:
    image: ghcr.io/midnight-ntwrk/indexer:latest
    container_name: midnight-indexer
    ports:
      - "8088:8088"
    environment:
      - NODE_URL=http://midnight-node:9944
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/midnight
      - GRAPHQL_PORT=8088
      - RUST_LOG=info
    depends_on:
      postgres:
        condition: service_healthy
      midnight-node:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - midnight-network

  # PostgreSQL database for indexer
  postgres:
    image: postgres:15-alpine
    container_name: midnight-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=midnight
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - midnight-network

  # Midnight Proof Server - Generates ZK proofs
  midnight-proof-server:
    image: ghcr.io/midnight-ntwrk/proof-server:latest
    container_name: midnight-proof-server
    ports:
      - "6300:6300"
    environment:
      - RUST_LOG=info
      - PORT=6300
    volumes:
      - ./contracts:/contracts:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6300/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - midnight-network

volumes:
  midnight-node-data:
  postgres-data:

networks:
  midnight-network:
    driver: bridge
