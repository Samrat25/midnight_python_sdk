version: '3.8'

# Local Development Midnight Network
# Uses mock services that simulate real Midnight behavior

services:
  # Mock Midnight Node
  midnight-node-mock:
    build:
      context: ./docker/node
      dockerfile: Dockerfile
    container_name: midnight-node-local
    ports:
      - "9944:9944"
    environment:
      - NETWORK_ID=undeployed
      - LOG_LEVEL=info
    volumes:
      - ./docker/node/data:/data
    networks:
      - midnight-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9944/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  # Mock Midnight Indexer with GraphQL
  midnight-indexer-mock:
    build:
      context: ./docker/indexer
      dockerfile: Dockerfile
    container_name: midnight-indexer-local
    ports:
      - "8088:8088"
    environment:
      - NODE_URL=http://midnight-node-mock:9944
      - NETWORK_ID=undeployed
    depends_on:
      - midnight-node-mock
    networks:
      - midnight-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  # Mock Midnight Proof Server
  midnight-proof-mock:
    build:
      context: ./docker/proof
      dockerfile: Dockerfile
    container_name: midnight-proof-local
    ports:
      - "6300:6300"
    environment:
      - LOG_LEVEL=info
    networks:
      - midnight-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6300/health"]
      interval: 5s
      timeout: 3s
      retries: 3

networks:
  midnight-local:
    driver: bridge
