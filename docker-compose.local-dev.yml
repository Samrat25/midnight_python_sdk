version: '3.8'

# This docker-compose file sets up a local Midnight development environment
# It's based on the midnight-local-dev project structure

services:
  # Compact Node - Local development blockchain
  compact-node:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: midnight-compact-node
    ports:
      - "9944:9944"
      - "9933:9933"
    environment:
      - RUST_LOG=info
    volumes:
      - node-data:/data
      - ./contracts:/contracts:ro
    command: >
      compact node start
      --dev
      --tmp
      --rpc-port 9944
      --ws-port 9933
      --rpc-cors all
      --unsafe-rpc-external
      --unsafe-ws-external
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9944 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - midnight-net

  # Indexer - GraphQL API
  indexer:
    build:
      context: .
      dockerfile: Dockerfile.indexer
    container_name: midnight-indexer
    ports:
      - "8088:8088"
    environment:
      - NODE_WS_URL=ws://compact-node:9933
      - DATABASE_URL=postgresql://midnight:midnight@postgres:5432/midnight_indexer
      - PORT=8088
      - RUST_LOG=info
    depends_on:
      postgres:
        condition: service_healthy
      compact-node:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - midnight-net

  # PostgreSQL for indexer
  postgres:
    image: postgres:15-alpine
    container_name: midnight-postgres
    environment:
      - POSTGRES_USER=midnight
      - POSTGRES_PASSWORD=midnight
      - POSTGRES_DB=midnight_indexer
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U midnight"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - midnight-net

  # Proof Server
  proof-server:
    build:
      context: .
      dockerfile: Dockerfile.proof
    container_name: midnight-proof-server
    ports:
      - "6300:6300"
    environment:
      - PORT=6300
      - RUST_LOG=info
    volumes:
      - ./contracts:/contracts:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6300/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - midnight-net

volumes:
  node-data:
  postgres-data:

networks:
  midnight-net:
    driver: bridge
